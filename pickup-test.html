<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>UPS Pickup — Test Harness</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
<style>
  body { background: #f4f6f9; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .card { box-shadow: 0 4px 16px rgba(0,0,0,.06); border: 0; }
  .card-header { background: #143B87; color: #fff; font-weight: 600; }
  .badge-env { font-size: 11px; vertical-align: middle; margin-left: 8px; }
  pre.result { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 6px; font-size: 12px; max-height: 420px; overflow:auto; }
  .ok { color: #28a745; font-weight: 600; }
  .fail { color: #dc3545; font-weight: 600; }
  .small-muted { font-size: 11px; color: #6c757d; }
  label.form-label { font-size: 12px; font-weight: 600; color: #495057; margin-bottom: 2px; }
</style>
</head>
<body>

<div class="container" style="max-width: 1100px;">
  <h3 class="mb-3">
    UPS Pickup On-Call — Test Harness
    <span id="envBadge" class="badge bg-secondary badge-env">env: ?</span>
  </h3>
  <p class="small-muted mb-4">
    Fires <code>POST /api/pickup/schedule</code> against the UPS Pickup API. Use this to validate OAuth + payload before porting to Portal2.
    Defaults pre-filled from the 4/29 Shadelands example.
  </p>

  <div class="row g-3">
    <!-- LEFT: form -->
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header">Pickup Request</div>
        <div class="card-body">
          <div class="row g-2">
            <div class="col-12">
              <label class="form-label">Company Name *</label>
              <input id="companyName" class="form-control form-control-sm" value="Shadelands Advanced Endoscopy" />
            </div>
            <div class="col-6">
              <label class="form-label">Contact Name *</label>
              <input id="contactName" class="form-control form-control-sm" value="Rosa C." />
            </div>
            <div class="col-6">
              <label class="form-label">Phone</label>
              <input id="phone" class="form-control form-control-sm" value="(925) 933-3600" />
            </div>
            <div class="col-12">
              <label class="form-label">Address 1 *</label>
              <input id="address1" class="form-control form-control-sm" value="498 N Wiget Ln" />
            </div>
            <div class="col-12">
              <label class="form-label">Address 2 (Suite/Room)</label>
              <input id="address2" class="form-control form-control-sm" value="" />
            </div>
            <div class="col-6">
              <label class="form-label">City *</label>
              <input id="city" class="form-control form-control-sm" value="Walnut Creek" />
            </div>
            <div class="col-2">
              <label class="form-label">State *</label>
              <input id="state" class="form-control form-control-sm" value="CA" />
            </div>
            <div class="col-4">
              <label class="form-label">Zip *</label>
              <input id="zip" class="form-control form-control-sm" value="94598" />
            </div>

            <div class="col-12"><hr class="my-1" /></div>

            <div class="col-4">
              <label class="form-label">Pickup Date *</label>
              <input id="pickupDate" type="date" class="form-control form-control-sm" />
            </div>
            <div class="col-4">
              <label class="form-label">Ready Time</label>
              <input id="readyTime" type="time" class="form-control form-control-sm" value="08:00" />
            </div>
            <div class="col-4">
              <label class="form-label">Close Time *</label>
              <input id="closeTime" type="time" class="form-control form-control-sm" value="14:00" />
            </div>
            <div class="col-4">
              <label class="form-label">Package Count</label>
              <input id="packageCount" type="number" class="form-control form-control-sm" value="1" min="1" />
            </div>
            <div class="col-4">
              <label class="form-label">Weight (lbs)</label>
              <input id="weightLbs" type="number" class="form-control form-control-sm" value="10" min="1" />
            </div>
            <div class="col-4 d-flex align-items-end">
              <div class="form-check mb-1">
                <input id="residential" class="form-check-input" type="checkbox" />
                <label class="form-check-label small" for="residential">Residential</label>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Special Instructions (max 90 chars)</label>
              <input id="specialInstruction" class="form-control form-control-sm" maxlength="90"
                     value="GIF-H190 SN 2312451 — Repair Request from TSI portal" />
            </div>
          </div>

          <div class="mt-3 d-flex gap-2">
            <button id="btnSchedule" class="btn btn-primary btn-sm">Schedule Pickup</button>
            <button id="btnHealth" class="btn btn-outline-secondary btn-sm">Health Check</button>
            <button id="btnTokenTest" class="btn btn-outline-secondary btn-sm">Test OAuth</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: result -->
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header">Result</div>
        <div class="card-body">
          <div id="summary" class="mb-2 small-muted">No request sent yet.</div>
          <pre id="result" class="result">{ }</pre>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Default Pickup Date to tomorrow
document.getElementById('pickupDate').value = (() => {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
})();

const $ = id => document.getElementById(id);
const fields = ['companyName','contactName','phone','address1','address2','city','state','zip',
                'pickupDate','readyTime','closeTime','packageCount','weightLbs','specialInstruction'];

function gather() {
  const o = {};
  fields.forEach(f => o[f] = $(f).value);
  o.packageCount = Number(o.packageCount) || 1;
  o.weightLbs    = Number(o.weightLbs) || 10;
  o.residential  = $('residential').checked;
  return o;
}

function showResult(headline, ok, body) {
  $('summary').innerHTML = `<span class="${ok ? 'ok' : 'fail'}">${ok ? '✓' : '✗'} ${headline}</span>`;
  $('result').textContent = JSON.stringify(body, null, 2);
}

async function refreshHealth() {
  try {
    const r = await fetch('/api/pickup/health');
    const j = await r.json();
    $('envBadge').className = 'badge badge-env ' + (j.env === 'PRODUCTION' ? 'bg-danger' : 'bg-warning text-dark');
    $('envBadge').textContent = 'env: ' + j.env + (j.hasClientId ? '' : ' (no creds)');
    return j;
  } catch (e) { /* server not up */ }
}

$('btnSchedule').onclick = async () => {
  const payload = gather();
  $('summary').textContent = 'Sending…';
  try {
    const r = await fetch('/api/pickup/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const j = await r.json();
    showResult(
      j.success ? `PRN ${j.prn || '(none)'} (${j.env})` : `Failed (${j.error || r.status})`,
      j.success,
      j
    );
  } catch (e) {
    showResult('Network error: ' + e.message, false, { error: e.message });
  }
};

$('btnHealth').onclick = async () => {
  const r = await fetch('/api/pickup/health');
  const j = await r.json();
  showResult('Health check', j.hasClientId && j.hasClientSecret, j);
};

$('btnTokenTest').onclick = async () => {
  $('summary').textContent = 'Testing OAuth…';
  const r = await fetch('/api/pickup/health?testToken=1');
  const j = await r.json();
  showResult(j.tokenFetch === 'ok' ? 'OAuth ok' : 'OAuth failed', j.tokenFetch === 'ok', j);
};

refreshHealth();
</script>
</body>
</html>
